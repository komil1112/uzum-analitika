<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Uzum Analitika</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ================================================================
   UZUM ANALITIKA — Telegram Mini App Styles
   ================================================================ */
:root {
  --bg:      var(--tg-theme-bg-color, #ffffff);
  --bg2:     var(--tg-theme-secondary-bg-color, #f2f2f7);
  --text:    var(--tg-theme-text-color, #1c1c1e);
  --hint:    var(--tg-theme-hint-color, #8e8e93);
  --link:    var(--tg-theme-link-color, #007aff);
  --btn:     var(--tg-theme-button-color, #007aff);
  --btn-txt: var(--tg-theme-button-text-color, #ffffff);
  --accent:       #00b09b;
  --accent-soft:  rgba(0,176,155,0.12);
  --accent-mid:   rgba(0,176,155,0.3);
  --green:      #30d158;
  --green-soft: rgba(48,209,88,0.12);
  --red:        #ff453a;
  --red-soft:   rgba(255,69,58,0.12);
  --yellow:     #ffd60a;
  --radius:    14px;
  --radius-sm: 10px;
  --radius-xs: 8px;
  --nav-h:     62px;
  --header-h:  52px;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.05);
  --shadow-modal: 0 -4px 24px rgba(0,0,0,0.12);
  --skel-base:  var(--bg2);
  --skel-shine: rgba(255,255,255,0.55);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg2);
  color: var(--text);
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; }
input, textarea { font-family: inherit; }

/* ── App Header ── */
.app-header {
  flex-shrink: 0;
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: var(--bg);
  border-bottom: 1px solid rgba(0,0,0,0.06);
  position: relative;
  z-index: 100;
}
.header-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.header-actions { display: flex; gap: 6px; align-items: center; }
.icon-btn {
  background: var(--bg2);
  border: none; border-radius: 50%;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text); font-size: 15px;
  transition: opacity 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:active { opacity: 0.6; }
.icon-btn.accent { background: var(--accent-soft); color: var(--accent); }

/* ── Main Content ── */
.app-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 8px);
}

/* ── Bottom Navigation ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  display: flex;
  background: var(--bg);
  border-top: 1px solid rgba(0,0,0,0.07);
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 200;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 3px;
  padding: 9px 4px 8px;
  background: none; border: none; cursor: pointer;
  color: var(--hint);
  transition: color 0.18s;
  -webkit-tap-highlight-color: transparent;
}
.nav-btn.active { color: var(--accent); }
.nav-btn .nav-icon { font-size: 22px; line-height: 1; }
.nav-btn .nav-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.1px; line-height: 1; }

/* ── Skeleton ── */
@keyframes shimmer {
  0%   { background-position: -600px 0; }
  100% { background-position: 600px 0; }
}
.skel {
  background: linear-gradient(90deg, var(--skel-base) 25%, var(--skel-shine) 50%, var(--skel-base) 75%);
  background-size: 1200px 100%;
  animation: shimmer 1.5s ease-in-out infinite;
  border-radius: var(--radius-xs);
}
.skel-card {
  background: var(--bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  padding: 14px; overflow: hidden;
}

/* ── Product Card ── */
.product-card {
  background: var(--bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  overflow: hidden; position: relative; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.12s, box-shadow 0.12s;
  outline: 2px solid transparent;
  outline-offset: -2px;
}
.product-card:active { transform: scale(0.98); }
.product-card.selected { outline-color: var(--accent); }
.pc-top { display: flex; gap: 12px; padding: 13px 13px 11px; }
.pc-thumb {
  width: 58px; height: 58px; border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--bg2) 0%, rgba(0,0,0,0.04) 100%);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 26px; overflow: hidden;
}
.pc-thumb img { width: 100%; height: 100%; object-fit: cover; }
.pc-info { flex: 1; min-width: 0; }
.pc-title {
  font-size: 13px; font-weight: 600; line-height: 1.35; margin-bottom: 5px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.pc-id { font-size: 11px; color: var(--hint); margin-bottom: 5px; }
.weekly-badge {
  display: inline-flex; align-items: center; gap: 3px;
  background: var(--green-soft); color: var(--green);
  border-radius: 20px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.pc-stats { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid rgba(0,0,0,0.05); }
.stat-cell { padding: 9px 6px; text-align: center; border-right: 1px solid rgba(0,0,0,0.05); }
.stat-cell:last-child { border-right: none; }
.stat-lbl { font-size: 10px; color: var(--hint); margin-bottom: 2px; }
.stat-val { font-size: 14px; font-weight: 800; letter-spacing: -0.3px; }
.stat-val.pos { color: var(--green); }
.stat-val.neg { color: var(--red); }
.sel-check {
  position: absolute; top: 9px; right: 9px;
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--hint); background: var(--bg);
  display: none; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: white;
  transition: all 0.15s;
}
.select-mode .sel-check { display: flex; }
.product-card.selected .sel-check { background: var(--accent); border-color: var(--accent); }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; padding: 13px 20px; border-radius: var(--radius-sm);
  border: none; font-size: 15px; font-weight: 600; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.15s, transform 0.1s;
  white-space: nowrap;
}
.btn:active { opacity: 0.7; transform: scale(0.97); }
.btn:disabled { opacity: 0.4; pointer-events: none; }
.btn-primary  { background: var(--btn); color: var(--btn-txt); }
.btn-accent   { background: var(--accent); color: #fff; }
.btn-ghost    { background: var(--bg2); color: var(--text); }
.btn-danger   { background: var(--red-soft); color: var(--red); }
.btn-full     { width: 100%; }
.btn-sm { padding: 8px 14px; font-size: 13px; border-radius: var(--radius-xs); }

/* ── Inputs ── */
.inp {
  background: var(--bg2); border: 1.5px solid transparent;
  border-radius: var(--radius-sm); padding: 12px 14px;
  font-size: 15px; color: var(--text); outline: none;
  transition: border-color 0.2s; width: 100%;
}
.inp:focus { border-color: var(--accent); }
.inp::placeholder { color: var(--hint); }
.inp-row { display: flex; gap: 8px; padding: 12px 14px; }
.inp-row .inp { flex: 1; }
textarea.inp { min-height: 130px; resize: none; font-size: 14px; line-height: 1.5; }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 500; display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet {
  background: var(--bg);
  border-radius: var(--radius) var(--radius) 0 0;
  width: 100%; max-height: 88vh;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  padding-bottom: env(safe-area-inset-bottom);
  box-shadow: var(--shadow-modal);
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle {
  width: 36px; height: 4px; background: rgba(0,0,0,0.12);
  border-radius: 2px; margin: 10px auto 0; flex-shrink: 0;
}
.modal-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px; flex-shrink: 0;
  border-bottom: 1px solid rgba(0,0,0,0.05);
}
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close {
  background: var(--bg2); border: none; border-radius: 50%;
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 13px; color: var(--hint);
}
.modal-body { flex: 1; overflow-y: auto; padding: 14px 16px 20px; }

/* ── Chips ── */
.chip-row {
  display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
  padding-bottom: 2px; margin-bottom: 14px;
}
.chip-row::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  background: var(--bg2); color: var(--hint);
  font-size: 13px; font-weight: 600; border: none; cursor: pointer;
  transition: all 0.18s;
}
.chip.active { background: var(--accent-soft); color: var(--accent); }

/* ── Progress Bar ── */
.prog-wrap { background: var(--bg2); border-radius: 4px; height: 6px; overflow: hidden; margin-top: 5px; }
.prog-fill { height: 100%; border-radius: 4px; transition: width 0.7s cubic-bezier(0.4,0,0.2,1); }

/* ── Color Dot ── */
.clr-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid rgba(0,0,0,0.08); }

/* ── Section Header ── */
.sec-hdr { padding: 14px 14px 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.9px; color: var(--hint); }

/* ── Divider ── */
.divider { height: 8px; background: var(--bg2); }

/* ── Stat Boxes ── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 14px 14px; }
.stat-box { background: var(--bg2); border-radius: var(--radius-sm); padding: 12px 13px; }
.sb-lbl { font-size: 11px; color: var(--hint); margin-bottom: 3px; }
.sb-val { font-size: 22px; font-weight: 800; letter-spacing: -0.6px; line-height: 1.1; }
.sb-sub { font-size: 11px; color: var(--hint); margin-top: 2px; }

/* ── Product Hero ── */
.prod-hero { display: flex; gap: 13px; padding: 14px; background: var(--bg); }
.prod-hero-img {
  width: 88px; height: 88px; border-radius: var(--radius);
  background: linear-gradient(135deg, var(--bg2), rgba(0,0,0,0.04));
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 36px; overflow: hidden;
}
.prod-hero-img img { width: 100%; height: 100%; object-fit: cover; }
.prod-hero-info { flex: 1; min-width: 0; }
.prod-title { font-size: 15px; font-weight: 700; line-height: 1.3; margin-bottom: 5px; }
.prod-cat { font-size: 12px; color: var(--hint); margin-bottom: 7px; }
.rating-row { display: flex; align-items: center; gap: 6px; }
.rating-stars { color: var(--yellow); font-size: 12px; letter-spacing: 1px; }
.rating-num { font-size: 13px; font-weight: 700; }
.reviews-cnt { font-size: 12px; color: var(--hint); }

/* ── Color Card ── */
.color-card { margin: 0 14px 14px; background: var(--bg); border-radius: var(--radius); box-shadow: var(--shadow-card); overflow: hidden; }
.color-card-hdr { display: flex; align-items: center; justify-content: space-between; padding: 13px 14px; border-bottom: 1px solid rgba(0,0,0,0.05); }
.color-card-title { font-size: 15px; font-weight: 700; }
.color-card-sub { font-size: 11px; color: var(--hint); margin-top: 1px; }
.color-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid rgba(0,0,0,0.04); }
.color-row:last-child { border-bottom: none; }
.color-info { flex: 1; min-width: 0; }
.color-name { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.color-meta { font-size: 11px; color: var(--hint); margin-top: 1px; }
.color-sold-val { font-size: 19px; font-weight: 800; letter-spacing: -0.4px; text-align: right; flex-shrink: 0; min-width: 36px; }
.color-pct { font-size: 11px; color: var(--hint); text-align: right; }
.rank-badge { font-size: 10px; font-weight: 800; color: white; background: var(--accent); border-radius: 4px; padding: 2px 5px; flex-shrink: 0; }

/* ── Variants Table ── */
.variants-card { margin: 0 14px 14px; background: var(--bg); border-radius: var(--radius); box-shadow: var(--shadow-card); overflow: hidden; }
.vt-head { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; padding: 9px 13px; background: var(--bg2); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--hint); }
.vt-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; padding: 10px 13px; border-top: 1px solid rgba(0,0,0,0.04); font-size: 12px; align-items: center; }
.vt-color-cell { display: flex; align-items: center; gap: 6px; }

/* ── Seller Card ── */
.seller-card { margin: 0 14px 14px; background: var(--bg2); border-radius: var(--radius); padding: 13px 14px; display: flex; align-items: center; gap: 12px; }
.seller-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.seller-name { font-size: 14px; font-weight: 700; }
.seller-meta { font-size: 12px; color: var(--hint); margin-top: 2px; }

/* ── Category Tab ── */
.step-row { display: flex; align-items: center; padding: 16px 16px 10px; gap: 0; }
.step-dot { width: 28px; height: 28px; border-radius: 50%; background: var(--bg2); color: var(--hint); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.step-dot.act { background: var(--accent); color: #fff; }
.step-dot.done { background: var(--green); color: #fff; }
.step-line { flex: 1; height: 2px; background: var(--bg2); transition: background 0.3s; }
.step-line.done { background: var(--green); }
.code-block { margin: 0 14px 14px; background: #1e222a; border-radius: var(--radius); overflow: hidden; }
.code-block-hdr { display: flex; align-items: center; justify-content: space-between; padding: 9px 13px; border-bottom: 1px solid rgba(255,255,255,0.07); }
.code-lang { font-size: 11px; color: rgba(255,255,255,0.35); font-family: monospace; }
.code-copy-btn { background: rgba(255,255,255,0.1); border: none; border-radius: 6px; padding: 4px 10px; color: rgba(255,255,255,0.6); font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: background 0.15s; }
.code-copy-btn:active { background: rgba(255,255,255,0.2); }
.code-body { padding: 13px 14px; font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace; font-size: 12px; line-height: 1.65; color: #abb2bf; overflow-x: auto; white-space: pre; }
.kw  { color: #c678dd; }
.fn  { color: #61afef; }
.str { color: #98c379; }
.cmt { color: #5c6370; font-style: italic; }
.num { color: #d19a66; }
.anim-bar { background: var(--bg2); border-radius: 4px; height: 5px; overflow: hidden; }
.anim-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--link)); border-radius: 4px; transition: width 0.25s ease; }
.results-card { margin: 0 14px 14px; background: var(--bg); border-radius: var(--radius); box-shadow: var(--shadow-card); overflow: hidden; }
.res-row { display: flex; align-items: center; gap: 10px; padding: 11px 13px; border-bottom: 1px solid rgba(0,0,0,0.04); }
.res-row:last-child { border-bottom: none; }
.res-rank { font-size: 11px; font-weight: 700; color: var(--hint); width: 18px; text-align: center; flex-shrink: 0; }
.res-info { flex: 1; min-width: 0; }
.res-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.res-id { font-size: 11px; color: var(--hint); }
.res-buyers { text-align: right; flex-shrink: 0; margin-right: 6px; }
.res-buyers-num { font-size: 16px; font-weight: 800; color: var(--green); }
.res-buyers-lbl { font-size: 10px; color: var(--hint); }
.res-chk { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.15); flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; font-weight: 700; color: white; transition: all 0.18s; }
.res-chk.on { background: var(--accent); border-color: var(--accent); }

/* ── Research Tab ── */
.research-pg { padding: 16px 14px; }
.research-hero { text-align: center; padding: 24px 10px 28px; }
.research-emoji { font-size: 58px; margin-bottom: 14px; }
.research-headline { font-size: 24px; font-weight: 800; letter-spacing: -0.6px; margin-bottom: 8px; }
.research-sub { font-size: 14px; color: var(--hint); line-height: 1.55; }
.research-feature { background: var(--bg); border-radius: var(--radius); box-shadow: var(--shadow-card); padding: 15px 14px; margin-bottom: 10px; display: flex; gap: 13px; align-items: flex-start; }
.rf-icon { font-size: 28px; flex-shrink: 0; margin-top: 2px; }
.rf-title { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.rf-desc { font-size: 13px; color: var(--hint); line-height: 1.45; }
.soon-tag { display: inline-block; margin-top: 7px; background: var(--bg2); color: var(--hint); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; padding: 3px 8px; border-radius: 5px; }

/* ── Action Bar ── */
.action-bar {
  position: fixed;
  bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
  left: 0; right: 0;
  background: var(--bg);
  border-top: 1px solid rgba(0,0,0,0.07);
  padding: 10px 14px;
  display: flex; gap: 8px; align-items: center;
  transform: translateY(100%);
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  z-index: 150;
}
.action-bar.vis { transform: translateY(0); }
.action-count { flex: 1; font-size: 14px; font-weight: 600; }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 12px);
  left: 50%; transform: translateX(-50%) translateY(8px);
  background: rgba(30,30,30,0.88); color: #fff;
  padding: 9px 18px; border-radius: 20px;
  font-size: 13px; font-weight: 500;
  opacity: 0; transition: all 0.25s;
  z-index: 1000; white-space: nowrap;
  backdrop-filter: blur(8px); pointer-events: none;
}
.toast.vis { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Spinner ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 20px; height: 20px; border: 2px solid rgba(0,0,0,0.08); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.65s linear infinite; flex-shrink: 0; }

/* ── Hint Box ── */
.hint-box { background: var(--accent-soft); border-radius: var(--radius-sm); padding: 11px 13px; margin-bottom: 14px; }
.hint-box-title { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
.hint-box-text { font-size: 13px; line-height: 1.5; color: var(--text); }

/* ── Empty State ── */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 56px 28px; text-align: center; gap: 10px; }
.empty-icon { font-size: 54px; }
.empty-title { font-size: 18px; font-weight: 700; }
.empty-desc { font-size: 14px; color: var(--hint); line-height: 1.5; max-width: 280px; }

/* ── Card list ── */
.card-list { display: flex; flex-direction: column; gap: 10px; padding: 12px 14px; }

/* Utility */
.txt-hint { color: var(--hint); }
.txt-accent { color: var(--accent); }
.txt-green { color: var(--green); }
.txt-red { color: var(--red); }
.fw7 { font-weight: 700; }
.fw8 { font-weight: 800; }
.fz11 { font-size: 11px; }
.fz13 { font-size: 13px; }
</style>
</head>
<body>

  <!-- ══ APP HEADER ══════════════════════════════════════════════ -->
  <header class="app-header">
    <span class="header-title" id="headerTitle">Kuzatuv</span>
    <div class="header-actions" id="headerActions"></div>
  </header>

  <!-- ══ MAIN CONTENT ════════════════════════════════════════════ -->
  <main class="app-content" id="appContent"></main>

  <!-- ══ BOTTOM NAVIGATION ══════════════════════════════════════ -->

  <div class="toast" id="toast"></div>

<script>
/* ================================================================
   API LAYER — real endpoints + mock fallback
   FIX: apiWeekly converts {weekly:{}} → array format
   FIX: fmtStat handles null values
   ================================================================ */

// Telegram user ID
const USER_ID = (function () {
  try { return window.Telegram.WebApp.initDataUnsafe.user.id || 0; } catch { return 0; }
})();

// Color name → hex
const COLOR_HEX = {
  'graphite':'#636369','white':'#f5f5f5','oq':'#f5f5f5','qora':'#1c1c1e',
  'black':'#1c1c1e','bora purple':'#c77dff','purple':'#af52de',
  "ko'k":'#2481cc','blue':'#2481cc','navy':'#1a2a5e',"to'q ko'k":'#1a2a5e',
  'red':'#ff453a','qizil':'#ff453a','green':'#30d158','yashil':'#30d158',
  'silver':'#aeaeb2','gold':'#d4a017','rose gold':'#b76e79',
  'mint':'#00c7be','teal':'#30b0c7','pink':'#ff375f','pushti':'#ff375f',
  'gray':'#8e8e93','kulrang':'#8e8e93','cream':'#f5e6c8','brown':'#8b5a2b',
  'orange':'#ff9f0a','sariq':'#ffd60a','yellow':'#ffd60a',
};
function colorHex(name) {
  return COLOR_HEX[(name || '').toLowerCase()] || '#aeaeb2';
}
window.colorHex = colorHex;

// Product emoji
function productEmoji(t) {
  t = (t || '').toLowerCase();
  if (/quloq|buds|earphone|headphone/.test(t)) return '🎧';
  if (/soat|watch/.test(t))                    return '⌚';
  if (/telefon|phone|iphone|samsung g/.test(t))return '📱';
  if (/noutbuk|laptop/.test(t))                return '💻';
  if (/poyabzal|shoe|boot|sneaker/.test(t))    return '👟';
  if (/kiyim|shirt|ko'ylak|dress/.test(t))     return '👕';
  if (/sumka|bag/.test(t))                     return '👜';
  if (/kitob|book/.test(t))                    return '📚';
  if (/parfum|atir/.test(t))                   return '🌸';
  if (/speaker|sokin/.test(t))                 return '🔊';
  return '📦';
}
window.productEmoji = productEmoji;

// Number formatter
function fmt(n) {
  if (n === null || n === undefined) return '—';
  return Number(n).toLocaleString('ru-RU');
}
window.fmt = fmt;

// FIX: stat formatter — null → "—", positive → "+N", 0 → "0"
function fmtStat(n) {
  if (n === null || n === undefined) return '—';
  if (n > 0) return '+' + n;
  return String(n);
}
window.fmtStat = fmtStat;

// "N soat oldin" — UTC ISO vaqtdan nisbiy yangilik
function timeAgo(iso) {
  if (!iso) return '';
  var t = Date.parse(iso.endsWith('Z') || iso.indexOf('+') > -1 ? iso : iso + 'Z');
  if (isNaN(t)) return '';
  var diff = Math.max(0, (Date.now() - t) / 1000);
  if (diff < 90) return 'hozir';
  if (diff < 3600) return Math.round(diff / 60) + ' daq oldin';
  if (diff < 86400) return Math.round(diff / 3600) + ' soat oldin';
  return Math.round(diff / 86400) + ' kun oldin';
}
window.timeAgo = timeAgo;

// ── API functions ─────────────────────────────────────────────────

async function apiGetTracked() {
  const r = await fetch('/api/tracked?user_id=' + USER_ID);
  if (!r.ok) throw new Error('tracked failed');
  return r.json();
}

async function apiGetProduct(id) {
  const r = await fetch('/api/product/' + id + '?user_id=' + USER_ID);
  if (!r.ok) throw new Error('product failed');
  return r.json();
}

async function apiGetColorSales(id, days) {
  days = days || 7;
  const r = await fetch('/api/product/' + id + '/color-sales?days=' + days);
  if (!r.ok) throw new Error('color-sales failed');
  return r.json();
}

async function apiGetSalesHistory(id, days) {
  days = days || 7;
  const r = await fetch('/api/product/' + id + '/sales-history?days=' + days);
  if (!r.ok) throw new Error('sales-history failed');
  return r.json();
}

async function apiTrack(ids) {
  const r = await fetch('/api/track', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ids: ids, user_id: USER_ID })
  });
  if (!r.ok) throw new Error('track failed');
  return r.json();
}

async function apiUntrack(id) {
  const r = await fetch('/api/untrack/' + id + '?user_id=' + USER_ID, { method: 'DELETE' });
  if (!r.ok) throw new Error('untrack failed');
  return r.json();
}

// FIX: convert server response {weekly: {pid: count}} → [{id, weeklyBuyers}]
async function apiWeekly(ids) {
  const r = await fetch('/api/weekly', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ids: ids })
  });
  if (!r.ok) throw new Error('weekly failed');
  const data = await r.json();
  // Server returns {weekly: {"12345": 89, ...}}
  if (data && data.weekly) {
    return Object.entries(data.weekly).map(function(e) {
      return { id: String(e[0]), weeklyBuyers: e[1] || 0 };
    });
  }
  // If already array format — return as is
  if (Array.isArray(data)) return data;
  return [];
}

// Batch product info (for category enrichment)
async function apiProducts(ids) {
  const r = await fetch('/api/products', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ids: ids })
  });
  if (!r.ok) throw new Error('products failed');
  return r.json();
}
</script>

<script>
/* ================================================================
   TAB 1 — Kuzatuv (Tracking)
   FIX: null handling in stat cells via fmtStat()
   ================================================================ */

const tracking = {
  products: [],
  loading: false,
  selectMode: false,
  selected: new Set(),
  currentHistoryId: null,
  currentHistoryDays: 7,

  async init() {
    this.renderHeader();
    this.renderSkeleton();
    await this.load();
  },

  renderHeader() {
    document.getElementById('headerActions').innerHTML =
      '<button class="icon-btn" id="selBtn" onclick="tracking.toggleSelectMode()" title="Tanlash">' +
        '<svg width="16" height="16" viewBox="0 0 16 16" fill="none">' +
          '<rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/>' +
          '<rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/>' +
          '<rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/>' +
          '<rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/>' +
        '</svg>' +
      '</button>' +
      '<button class="icon-btn" id="refBtn" onclick="tracking.refresh()" title="Yangilash">' +
        '<svg width="16" height="16" viewBox="0 0 16 16" fill="none">' +
          '<path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c1.8 0 3.4.87 4.4 2.2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>' +
          '<path d="M12 2.5 12.5 5l-2.5.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>' +
        '</svg>' +
      '</button>';
  },

  renderSkeleton() {
    var c = document.getElementById('appContent');
    var h = '<div class="card-list">';
    for (var i = 0; i < 3; i++) {
      h += '<div class="skel-card">' +
        '<div style="display:flex;gap:12px;margin-bottom:12px">' +
          '<div class="skel" style="width:58px;height:58px;border-radius:10px;flex-shrink:0"></div>' +
          '<div style="flex:1;display:flex;flex-direction:column;gap:8px;padding-top:3px">' +
            '<div class="skel" style="height:13px;width:88%"></div>' +
            '<div class="skel" style="height:12px;width:55%"></div>' +
            '<div class="skel" style="height:20px;width:42%;border-radius:20px"></div>' +
          '</div>' +
        '</div>' +
        '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">' +
          '<div class="skel" style="height:38px;border-radius:6px"></div>' +
          '<div class="skel" style="height:38px;border-radius:6px"></div>' +
          '<div class="skel" style="height:38px;border-radius:6px"></div>' +
          '<div class="skel" style="height:38px;border-radius:6px"></div>' +
        '</div>' +
      '</div>';
    }
    h += '</div>';
    c.innerHTML = h;
  },

  async load() {
    this.loading = true;
    try {
      var data = await apiGetTracked();
      this.products = data.products || [];
    } catch (e) {
      showToast('❌ Yuklashda xato: ' + (e.message || ''));
      this.products = [];
    }
    this.loading = false;
    this.render();
  },

  async refresh() {
    var btn = document.getElementById('refBtn');
    if (btn) btn.style.animation = 'spin 0.65s linear infinite';
    try {
      // To'liq yangilash: stock/orders + "Bu hafta X kishi" (Playwright scraping)
      await fetch('/api/refresh?weekly=1', { method: 'POST' });
      showToast('⏳ Haftalik ma\'lumot yangilanmoqda...');

      // Holatni kuzatamiz (har 3s, maks ~180s)
      var finished = false;
      for (var i = 0; i < 60 && !finished; i++) {
        await new Promise(function(res){ setTimeout(res, 3000); });
        try {
          var st = await fetch('/api/refresh-status').then(function(r){ return r.json(); });
          if (st.total > 0 && st.phase === 'weekly') {
            showToast('⏳ Haftalik: ' + st.done + '/' + st.total);
          }
          if (!st.running && st.phase === 'done') { finished = true; }
        } catch (e) { /* poll xatosi — davom */ }
      }
    } catch (e) { /* xato bo'lsa ham yuklaymiz */ }
    await this.load();
    if (btn) btn.style.animation = '';
    showToast('✓ Yangilandi');
  },

  render() {
    var c = document.getElementById('appContent');
    if (!this.products.length) {
      c.innerHTML =
        '<div class="empty-state">' +
          '<div class="empty-icon">📭</div>' +
          '<div class="empty-title">Ro\'yxat bo\'sh</div>' +
          '<div class="empty-desc">Mahsulot tahlili bo\'limidan birinchi mahsulotingizni kuzatuvga qo\'shing</div>' +
        '</div>';
      return;
    }

    // FIX: null-safe summation
    var totalWeekly = this.products.reduce(function(s, p) { return s + (p.last7d  || 0); }, 0);
    var totalToday  = this.products.reduce(function(s, p) { return s + (p.today   || 0); }, 0);
    var total30d    = this.products.reduce(function(s, p) { return s + (p.last30d || 0); }, 0);
    var self = this;

    c.innerHTML =
      '<div style="margin:12px 14px 2px;background:var(--bg);border-radius:var(--radius);box-shadow:var(--shadow-card);overflow:hidden">' +
        '<div style="padding:12px 14px 10px;border-bottom:1px solid rgba(0,0,0,0.05)">' +
          '<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--accent)">● Avtomatik kuzatuv</div>' +
          '<div style="font-size:13px;font-weight:600;color:var(--hint);margin-top:2px">' + this.products.length + ' ta mahsulot kuzatuvda</div>' +
        '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr 1fr">' +
          '<div style="padding:11px 12px;text-align:center;border-right:1px solid rgba(0,0,0,0.05);cursor:pointer" onclick="tracking.openSummaryModal(\'week\')">' +
            '<div style="font-size:18px;font-weight:800;color:var(--green);letter-spacing:-0.5px">+' + fmt(totalWeekly) + '</div>' +
            '<div style="font-size:10px;color:var(--hint);margin-top:2px">Bu hafta ›</div>' +
          '</div>' +
          '<div style="padding:11px 12px;text-align:center;border-right:1px solid rgba(0,0,0,0.05);cursor:pointer" onclick="tracking.openSummaryModal(\'today\')">' +
            '<div style="font-size:18px;font-weight:800;color:var(--green);letter-spacing:-0.5px">+' + fmt(totalToday) + '</div>' +
            '<div style="font-size:10px;color:var(--hint);margin-top:2px">Bugun ›</div>' +
          '</div>' +
          '<div style="padding:11px 12px;text-align:center;cursor:pointer" onclick="tracking.openSummaryModal(\'month\')">' +
            '<div style="font-size:18px;font-weight:800;color:var(--text);letter-spacing:-0.5px">' + fmt(total30d) + '</div>' +
            '<div style="font-size:10px;color:var(--hint);margin-top:2px">30 kunda ›</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="card-list ' + (this.selectMode ? 'select-mode' : '') + '" id="prodList">' +
        this.products.map(function(p) { return self.cardHTML(p); }).join('') +
      '</div>';
  },

  cardHTML(p) {
    var em = productEmoji(p.title);
    var sel = this.selected.has(String(p.id));
    var stockCls = p.stockNow < 30 ? 'neg' : (p.stockNow > 100 ? 'pos' : '');
    // FIX: use fmtStat for null-safe display
    var todayCls  = (p.today  > 0) ? ' pos' : '';
    var week7Cls  = (p.last7d > 0) ? ' pos' : '';

    return '<div class="product-card ' + (sel ? 'selected' : '') + '" id="pc-' + p.id + '" ' +
        'onclick="tracking.cardClick(\'' + p.id + '\')">' +
      '<div class="sel-check">' + (sel ? '✓' : '') + '</div>' +
      '<div class="pc-top">' +
        '<div class="pc-thumb">' +
          (p.photo
            ? '<img src="' + p.photo + '" alt="" loading="lazy" onerror="this.closest(\'.pc-thumb\').textContent=\'' + em + '\'">'
            : em) +
        '</div>' +
        '<div class="pc-info">' +
          '<div class="pc-title">' + (p.title || 'Mahsulot #' + p.id) + '</div>' +
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">' +
            '<div class="pc-id" style="margin-bottom:0">ID: ' + p.id + '</div>' +
            '<a href="https://uzum.uz/product/' + p.id + '" target="_blank" onclick="event.stopPropagation()" ' +
               'style="display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;color:var(--accent);text-decoration:none;background:var(--accent-soft);padding:2px 8px;border-radius:20px;flex-shrink:0">' +
              'Uzumda ko\'rish ↗' +
            '</a>' +
          '</div>' +
          '<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">' +
            '<div class="weekly-badge">👥 Bu hafta ' + fmt(p.weeklyBuyers) + ' kishi</div>' +
            (p.weeklyUpdatedAt ? '<span style="font-size:10px;color:var(--hint)">🕐 ' + timeAgo(p.weeklyUpdatedAt) + '</span>' : '') +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="pc-stats">' +
        '<div class="stat-cell"><div class="stat-lbl">Bugun</div><div class="stat-val' + todayCls + '">' + fmtStat(p.today) + '</div></div>' +
        (function() {
          var dataDays = p.addedAt ? Math.floor((Date.now() - Date.parse(p.addedAt.endsWith('Z')||p.addedAt.indexOf('+')>-1 ? p.addedAt : p.addedAt+'Z')) / 86400000) : 99;
          var lbl7  = dataDays < 7  ? (dataDays + ' kun') : '7 kun';
          var lbl30 = dataDays < 30 ? (dataDays + ' kun') : '30 kun';
          return '<div class="stat-cell"><div class="stat-lbl">' + lbl7 + '</div><div class="stat-val' + week7Cls + '">' + fmtStat(p.last7d) + '</div></div>' +
                 '<div class="stat-cell"><div class="stat-lbl">' + lbl30 + '</div><div class="stat-val">' + fmtStat(p.last30d) + '</div></div>';
        })() +
        '<div class="stat-cell"><div class="stat-lbl">Qoldiq</div><div class="stat-val ' + stockCls + '">' + fmt(p.stockNow) + '</div></div>' +
      '</div>' +
    '</div>';
  },

  cardClick(id) {
    if (this.selectMode) { this.toggleSel(id); }
    else { this.openHistory(id); }
  },

  toggleSelectMode() {
    this.selectMode = !this.selectMode;
    if (!this.selectMode) this.selected.clear();
    var btn = document.getElementById('selBtn');
    if (btn) btn.classList.toggle('accent', this.selectMode);
    this.render();
    this.syncActionBar();
  },

  cancelSelect() {
    this.selectMode = false;
    this.selected.clear();
    var btn = document.getElementById('selBtn');
    if (btn) btn.classList.remove('accent');
    document.getElementById('actionBar').classList.remove('vis');
    this.render();
  },

  toggleSel(id) {
    id = String(id);
    if (this.selected.has(id)) { this.selected.delete(id); }
    else { this.selected.add(id); }
    var card = document.getElementById('pc-' + id);
    if (card) {
      card.classList.toggle('selected', this.selected.has(id));
      var chk = card.querySelector('.sel-check');
      if (chk) chk.textContent = this.selected.has(id) ? '✓' : '';
    }
    this.syncActionBar();
  },

  syncActionBar() {
    var bar = document.getElementById('actionBar');
    var cnt = document.getElementById('actionCount');
    var del = document.getElementById('delSelBtn');
    var n = this.selected.size;
    if (this.selectMode) {
      bar.classList.add('vis');
      if (cnt) cnt.textContent = n + ' ta tanlangan';
      if (del) del.disabled = n === 0;
    } else {
      bar.classList.remove('vis');
    }
  },

  async deleteSelected() {
    var ids = Array.from(this.selected);
    if (!ids.length) return;
    try {
      await Promise.all(ids.map(function(id) { return apiUntrack(id); }));
      showToast('✓ ' + ids.length + ' ta o\'chirildi');
    } catch (e) {
      showToast('❌ O\'chirishda xato');
    }
    this.cancelSelect();
    await this.load();
  },

  async openHistory(id) {
    this.currentHistoryId = id;
    this.currentHistoryDays = 7;
    var prod = this.products.find(function(p) { return String(p.id) === String(id); });
    var title = prod ? (prod.title || '').slice(0, 40) + (prod.title && prod.title.length > 40 ? '…' : '') : 'Sotuv tarixi';
    openModal(title);
    document.getElementById('modalBody').innerHTML =
      '<div style="display:flex;justify-content:center;padding:48px"><div class="spinner"></div></div>';
    await this.fetchAndRenderHistory();
  },

  async fetchAndRenderHistory() {
    var id = this.currentHistoryId;
    var days = this.currentHistoryDays;
    try {
      var results = await Promise.all([apiGetSalesHistory(id, days), apiGetColorSales(id, days)]);
      var hist = results[0];
      var colors = results[1];
      var body = document.getElementById('modalBody');
      if (!body) return;
      body.innerHTML = this.historyHTML(hist, colors);
      requestAnimationFrame(function() {
        body.querySelectorAll('.prog-fill[data-w]').forEach(function(el) {
          el.style.width = el.dataset.w;
        });
      });
    } catch (e) {
      var body = document.getElementById('modalBody');
      if (body) body.innerHTML = '<div style="text-align:center;padding:28px;color:var(--hint)"><div style="font-size:30px;margin-bottom:8px">⚠️</div><div>Ma\'lumot yuklashda xato</div></div>';
    }
  },

  historyHTML(hist, colors) {
    var days = this.currentHistoryDays;
    var self = this;
    var h = '<div class="chip-row">' +
      [7, 14, 30].map(function(d) {
        return '<button class="chip ' + (days === d ? 'active' : '') + '" onclick="tracking.changeHistDays(' + d + ',this)">' + d + ' kun</button>';
      }).join('') +
      '</div>' +
      '<div style="margin-bottom:16px">' +
        '<div class="fz11 txt-hint" style="margin-bottom:3px">' + (hist.note || (days + ' kunlik sotuv')) + '</div>' +
        '<div style="font-size:30px;font-weight:800;letter-spacing:-1px">' + fmt(hist.total) + ' <span style="font-size:15px;font-weight:400" class="txt-hint">dona</span></div>' +
      '</div>';

    if (colors && colors.colors && colors.colors.length) {
      var sorted = colors.colors.slice().sort(function(a, b) { return b.sold - a.sold; });
      h += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px" class="txt-hint">🎨 Rang bo\'yicha</div>';
      h += '<div style="background:var(--bg2);border-radius:var(--radius);overflow:hidden;margin-bottom:20px">';
      sorted.forEach(function(c, i) {
        var hex = colorHex(c.color);
        h += '<div class="color-row">' +
          '<div class="clr-dot" style="background:' + hex + '"></div>' +
          '<div class="color-info" style="flex:1;min-width:0">' +
            '<div style="font-size:13px;font-weight:600">' + c.color + '</div>' +
            '<div class="prog-wrap"><div class="prog-fill" style="width:0;background:' + hex + '" data-w="' + (c.soldPct || 0) + '%"></div></div>' +
          '</div>' +
          '<div style="text-align:right;margin-left:10px;flex-shrink:0">' +
            '<div style="font-size:18px;font-weight:800">' + c.sold + '</div>' +
            '<div class="fz11 txt-hint">' + (c.soldPct || 0) + '%</div>' +
          '</div>' +
          (i === 0 ? '<div class="rank-badge">#1</div>' : '') +
        '</div>';
      });
      h += '</div>';
    }

    if (hist.events && hist.events.length) {
      var byDay = {};
      hist.events.forEach(function(e) {
        var key = e.isoTime ? e.isoTime.split('T')[0] : (e.day || '');
        if (!byDay[key]) byDay[key] = [];
        byDay[key].push(e);
      });
      h += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px" class="txt-hint">📋 Sotuv jurnali</div>';
      Object.entries(byDay).forEach(function(entry) {
        var day = entry[0], evs = entry[1];
        h += '<div style="font-size:13px;font-weight:600;color:var(--hint);margin:12px 0 6px">' + dayLabel(day) + '</div>';
        evs.forEach(function(e) {
          var hex = colorHex(e.color);
          var timeStr = e.time || (e.isoTime ? e.isoTime.split('T')[1].slice(0,5) : '');
          h += '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(0,0,0,0.05)">' +
            '<div class="fz11 txt-hint" style="min-width:36px">' + timeStr + '</div>' +
            '<div class="clr-dot" style="background:' + hex + '"></div>' +
            '<div style="flex:1;font-size:13px">' + (e.color || '') + (e.size && e.size !== 'One size' ? ' · ' + e.size : '') + '</div>' +
            '<div style="font-size:14px;font-weight:700" class="txt-green">+' + (e.qty || 0) + '</div>' +
          '</div>';
        });
      });
    } else {
      h += '<div style="text-align:center;padding:28px;color:var(--hint)"><div style="font-size:30px;margin-bottom:8px">📭</div><div>Bu davr uchun sotuv topilmadi</div></div>';
    }
    return h;
  },

  async changeHistDays(days, btn) {
    document.querySelectorAll('#modalBody .chip').forEach(function(c) { c.classList.remove('active'); });
    btn.classList.add('active');
    this.currentHistoryDays = days;
    document.getElementById('modalBody').innerHTML =
      '<div style="display:flex;justify-content:center;padding:48px"><div class="spinner"></div></div>';
    await this.fetchAndRenderHistory();
  },

  async openSummaryModal(period) {
    var cfg = {
      week:  { label: 'Bu haftalik sotuv', key: 'last7d',  days: 7  },
      today: { label: 'Bugungi sotuv',      key: 'today',  days: 7  },
      month: { label: '30 kunlik sotuv',    key: 'last30d', days: 30 },
    };
    var c = cfg[period];
    openModal(c.label);

    var sorted = this.products.slice()
      .sort(function(a, b) { return (b[c.key] || 0) - (a[c.key] || 0); })
      .filter(function(p) { return (p[c.key] || 0) > 0; });

    if (!sorted.length) {
      document.getElementById('modalBody').innerHTML =
        '<div style="text-align:center;padding:40px;color:var(--hint)">' +
          '<div style="font-size:32px;margin-bottom:10px">📭</div>' +
          '<div>Bu davr uchun sotuv yo\'q</div>' +
          '<div style="font-size:12px;margin-top:8px">Snapshot yetarli emas — mahsulotlar kuzatuvda bo\'lishi kerak</div>' +
        '</div>';
      return;
    }

    document.getElementById('modalBody').innerHTML =
      '<div style="display:flex;justify-content:center;padding:48px"><div class="spinner"></div></div>';

    try {
      var colorMap = {};
      await Promise.all(sorted.map(async function(p) {
        try {
          var d = await apiGetColorSales(p.id, c.days);
          colorMap[p.id] = (d.colors || []).slice().sort(function(a, b) { return b.sold - a.sold; });
        } catch { colorMap[p.id] = []; }
      }));

      var html = '';
      sorted.forEach(function(p, i) {
        var em = productEmoji(p.title);
        var colors = colorMap[p.id] || [];
        var isLast = i === sorted.length - 1;
        html += '<div style="margin-bottom:' + (isLast ? 0 : 18) + 'px">' +
          '<div style="display:flex;align-items:center;gap:10px;margin-bottom:' + (colors.length ? 10 : 0) + 'px">' +
            '<div style="font-size:12px;font-weight:700;color:var(--hint);min-width:18px;text-align:center">' + (i+1) + '</div>' +
            '<div style="font-size:20px;line-height:1">' + em + '</div>' +
            '<div style="flex:1;min-width:0">' +
              '<div style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (p.title || 'Mahsulot #'+p.id) + '</div>' +
              '<div style="font-size:11px;color:var(--hint);margin-top:1px">ID: ' + p.id + ' &nbsp;<a href="https://uzum.uz/product/' + p.id + '" target="_blank" style="color:var(--green);text-decoration:none;font-weight:600">Uzumda ko\'rish ↗</a></div>' +
            '</div>' +
            '<div style="font-size:20px;font-weight:800;color:var(--green);flex-shrink:0">+' + fmt(p[c.key]) + '</div>' +
          '</div>';

        if (colors.length) {
          html += '<div style="background:var(--bg2);border-radius:var(--radius-sm);overflow:hidden;margin-left:28px">';
          colors.forEach(function(col, ci) {
            var hex = colorHex(col.color);
            var pct = col.soldPct || 0;
            html += '<div style="padding:9px 12px;border-bottom:' + (ci < colors.length-1 ? '1px solid rgba(0,0,0,0.05)' : 'none') + '">' +
              '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">' +
                '<div class="clr-dot" style="background:' + hex + '"></div>' +
                '<div style="flex:1;font-size:12px;font-weight:600">' + col.color + '</div>' +
                '<div style="font-size:13px;font-weight:800">' + col.sold + '</div>' +
                '<div style="font-size:11px;color:var(--hint);min-width:28px;text-align:right">' + pct + '%</div>' +
                (ci === 0 ? '<div class="rank-badge">🏆</div>' : '<div style="width:26px"></div>') +
              '</div>' +
              '<div class="prog-wrap"><div class="prog-fill" data-w="' + pct + '%" style="width:0;background:' + hex + '"></div></div>' +
            '</div>';
          });
          html += '</div>';
        }
        html += '</div>';
        if (!isLast) html += '<div style="height:1px;background:rgba(0,0,0,0.06);margin-bottom:18px"></div>';
      });

      document.getElementById('modalBody').innerHTML = html;
      requestAnimationFrame(function() {
        document.querySelectorAll('#modalBody .prog-fill[data-w]').forEach(function(el) {
          el.style.width = el.dataset.w;
        });
      });
    } catch (e) {
      document.getElementById('modalBody').innerHTML =
        '<div style="text-align:center;padding:28px;color:var(--hint)">⚠️ Xato yuz berdi</div>';
    }
  }
};

function dayLabel(str) {
  try {
    var today = new Date().toISOString().split('T')[0];
    var yest = new Date(Date.now() - 86400000).toISOString().split('T')[0];
    if (str === today) return 'Bugun';
    if (str === yest)  return 'Kecha';
    return new Date(str).toLocaleDateString('ru-RU', {day:'numeric', month:'short'});
  } catch { return str; }
}
</script>

<script>
/* ================================================================
   TAB 2 — Mahsulot tahlili
   ================================================================ */

const product = {
  id: null,
  data: null,
  colorData: null,
  colorDays: 7,

  init() {
    document.getElementById('headerActions').innerHTML = '';
    this.renderShell();
  },

  renderShell() {
    var c = document.getElementById('appContent');
    c.innerHTML =
      '<div class="inp-row">' +
        '<input class="inp" type="number" id="pidInput" placeholder="Mahsulot ID kiriting..." value="' + (this.id || '') + '" onkeydown="if(event.key===\'Enter\') product.load()">' +
        '<button class="btn btn-accent" id="loadBtn" onclick="product.load()">Yuklash</button>' +
      '</div>' +
      '<div id="prodDetail">' + (this.data ? this.detailHTML() : this.placeholderHTML()) + '</div>';

    if (this.data) {
      requestAnimationFrame(function() {
        document.querySelectorAll('#prodDetail .prog-fill[data-w]').forEach(function(el) {
          el.style.width = el.dataset.w;
        });
      });
    }
  },

  placeholderHTML() {
    return '<div class="empty-state" style="padding-top:32px">' +
      '<div class="empty-icon">🔍</div>' +
      '<div class="empty-title">Mahsulot qidirish</div>' +
      '<div class="empty-desc">Uzum marketplace\'dan mahsulot ID raqamini kiriting va to\'liq tahlil ko\'ring</div>' +
      '<div style="margin-top:18px;background:var(--bg2);border-radius:var(--radius-sm);padding:13px 15px;text-align:left;width:100%;max-width:320px">' +
        '<div style="font-size:12px;font-weight:700;margin-bottom:5px" class="txt-hint">💡 ID qayerdan topiladi</div>' +
        '<div style="font-size:13px;line-height:1.55">Uzum.uz saytida mahsulot sahifasini oching — URL\'dagi raqam ID bo\'ladi:</div>' +
        '<div style="font-size:13px;font-family:monospace;margin-top:7px;color:var(--accent)">uzum.uz/product/<strong>91049454</strong>/...</div>' +
      '</div>' +
    '</div>';
  },

  async load() {
    var input = document.getElementById('pidInput');
    var rawId = input ? input.value.trim() : '';
    if (!rawId) { showToast('⚠️ ID kiriting'); return; }

    this.id = rawId;
    this.data = null;

    var btn = document.getElementById('loadBtn');
    if (btn) { btn.innerHTML = '<div class="spinner" style="width:16px;height:16px"></div>'; btn.disabled = true; }
    document.getElementById('prodDetail').innerHTML = this.skeletonHTML();

    try {
      var results = await Promise.all([apiGetProduct(rawId), apiGetColorSales(rawId, this.colorDays)]);
      this.data = results[0];
      this.colorData = results[1];
    } catch (e) {
      showToast('❌ Mahsulot topilmadi yoki token eskirgan');
    }

    this.renderShell();
  },

  skeletonHTML() {
    return '<div style="padding:0 14px">' +
      '<div style="display:flex;gap:13px;margin-bottom:18px;padding-top:4px">' +
        '<div class="skel" style="width:88px;height:88px;border-radius:14px;flex-shrink:0"></div>' +
        '<div style="flex:1;display:flex;flex-direction:column;gap:9px;padding-top:4px">' +
          '<div class="skel" style="height:15px;width:90%"></div>' +
          '<div class="skel" style="height:12px;width:58%"></div>' +
          '<div class="skel" style="height:18px;width:38%;border-radius:10px"></div>' +
        '</div>' +
      '</div>' +
      '<div class="skel" style="height:48px;margin-bottom:10px;border-radius:10px"></div>' +
      '<div class="skel" style="height:48px;margin-bottom:10px;border-radius:10px"></div>' +
      '<div class="skel" style="height:48px;margin-bottom:10px;border-radius:10px"></div>' +
    '</div>';
  },

  detailHTML() {
    var p = this.data;
    var em = productEmoji(p.title);
    var rating = Math.round(p.rating || 0);
    var stars = '★'.repeat(rating) + '☆'.repeat(5 - rating);
    var stockColor = p.totalAvailableAmount < 30 ? 'var(--red)' : (p.totalAvailableAmount > 100 ? 'var(--green)' : 'var(--text)');
    var self = this;
    var h = '';

    // Hero
    h += '<div class="prod-hero">' +
      '<div class="prod-hero-img">' +
        (p.photo ? '<img src="' + p.photo + '" alt="" onerror="this.closest(\'.prod-hero-img\').textContent=\'' + em + '\'">' : em) +
      '</div>' +
      '<div class="prod-hero-info">' +
        '<div class="prod-title">' + (p.title || '') + '</div>' +
        '<div class="prod-cat">' + (p.category || '') + '</div>' +
        '<div class="rating-row">' +
          '<span class="rating-stars">' + stars + '</span>' +
          '<span class="rating-num">' + (p.rating || '—') + '</span>' +
          '<span class="reviews-cnt">(' + fmt(p.reviewsAmount) + ' izoh)</span>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="divider"></div>';

    // Stats
    h += '<div class="sec-hdr">Asosiy ko\'rsatkichlar</div>' +
      '<div class="stats-grid">' +
        '<div class="stat-box"><div class="sb-lbl">Jami buyurtmalar</div><div class="sb-val">' + fmt(p.ordersAmount) + '</div><div class="sb-sub">barcha vaqt</div></div>' +
        '<div class="stat-box"><div class="sb-lbl">Ombor qoldig\'i</div><div class="sb-val" style="color:' + stockColor + '">' + fmt(p.totalAvailableAmount) + '</div><div class="sb-sub">dona qolgan</div></div>' +
      '</div>' +
      '<div class="divider"></div>';

    // Seller
    if (p.seller && p.seller.title) {
      h += '<div class="sec-hdr">Sotuvchi</div>' +
        '<div class="seller-card">' +
          '<div class="seller-avatar">🏪</div>' +
          '<div>' +
            '<div class="seller-name">' + p.seller.title + '</div>' +
            '<div class="seller-meta">★ ' + (p.seller.rating || '—') + ' · ' + fmt(p.seller.orders) + ' buyurtma</div>' +
          '</div>' +
        '</div>' +
        '<div class="divider"></div>';
    }

    // Color Sales
    if (this.colorData && this.colorData.colors && this.colorData.colors.length) {
      var sorted = this.colorData.colors.slice().sort(function(a, b) { return b.sold - a.sold; });
      var total = this.colorData.totalSold || sorted.reduce(function(s, c) { return s + c.sold; }, 0);
      h += '<div class="sec-hdr">Rang bo\'yicha sotuv</div>' +
        '<div class="color-card">' +
          '<div class="color-card-hdr">' +
            '<div>' +
              '<div class="color-card-title">🎨 Rang tahlili</div>' +
              '<div class="color-card-sub">' + this.colorDays + ' kunlik · jami ' + fmt(total) + ' dona</div>' +
            '</div>' +
            '<div style="display:flex;gap:5px">' +
              [7, 30].map(function(d) {
                return '<button class="chip ' + (self.colorDays === d ? 'active' : '') + '" style="padding:4px 10px" onclick="product.switchColorDays(' + d + ')">' + d + 'k</button>';
              }).join('') +
            '</div>' +
          '</div>';

      sorted.forEach(function(c, i) {
        var hex = colorHex(c.color);
        var pct = c.soldPct || (total > 0 ? Math.round(c.sold / total * 100) : 0);
        h += '<div class="color-row">' +
          '<div class="clr-dot" style="background:' + hex + '"></div>' +
          '<div class="color-info">' +
            '<div class="color-name">' + c.color + '</div>' +
            '<div class="color-meta">Qoldiq: ' + fmt(c.currentStock) + ' dona</div>' +
            '<div class="prog-wrap"><div class="prog-fill" data-w="' + pct + '%" style="width:0;background:' + hex + '"></div></div>' +
          '</div>' +
          '<div style="text-align:right;margin-left:10px;flex-shrink:0">' +
            '<div class="color-sold-val">' + c.sold + '</div>' +
            '<div class="color-pct">' + pct + '%</div>' +
          '</div>' +
          (i === 0 ? '<div class="rank-badge">🏆</div>' : '') +
        '</div>';
      });
      h += '</div><div class="divider"></div>';
    }

    // Variants
    if (p.variants && p.variants.length) {
      h += '<div class="sec-hdr">Variantlar jadvali</div>' +
        '<div class="variants-card">' +
          '<div class="vt-head"><div>Rang / O\'lcham</div><div style="text-align:center">Narx</div><div style="text-align:center">Qoldiq</div><div style="text-align:right">Holat</div></div>';
      p.variants.forEach(function(v) {
        var hex = colorHex(v.color);
        var ok = v.stock > 0;
        var lowStock = v.stock > 0 && v.stock < 10;
        h += '<div class="vt-row">' +
          '<div class="vt-color-cell"><div class="clr-dot" style="background:' + hex + '"></div>' +
            '<div><div style="font-size:13px;font-weight:500">' + v.color + '</div>' +
            (v.size && v.size !== 'One size' ? '<div class="fz11 txt-hint">' + v.size + '</div>' : '') +
          '</div></div>' +
          '<div style="text-align:center;font-size:12px" class="txt-hint">' + Math.round((v.price || 0) / 1000) + 'k</div>' +
          '<div style="text-align:center;font-weight:700;color:' + (lowStock ? 'var(--red)' : 'var(--text)') + '">' + v.stock + '</div>' +
          '<div style="text-align:right"><span style="font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;background:' + (ok ? 'var(--green-soft)' : 'var(--red-soft)') + ';color:' + (ok ? 'var(--green)' : 'var(--red)') + '">' + (ok ? 'Bor' : 'Yo\'q') + '</span></div>' +
        '</div>';
      });
      h += '</div>';
    }

    // Track button
    h += '<div style="padding:14px">' +
      '<button class="btn btn-accent btn-full" onclick="product.trackCurrent()">+ Kuzatuvga qo\'shish</button>' +
    '</div>';

    return h;
  },

  async switchColorDays(days) {
    if (this.colorDays === days || !this.id) return;
    this.colorDays = days;
    try {
      this.colorData = await apiGetColorSales(this.id, days);
    } catch (e) { showToast('❌ Xato'); }
    this.renderShell();
  },

  async trackCurrent() {
    if (!this.id) return;
    try {
      await apiTrack([this.id]);
      showToast('✓ Kuzatuvga qo\'shildi');
    } catch (e) {
      showToast('❌ Qo\'shishda xato');
    }
  }
};
</script>

<script>
/* ================================================================
   TAB 3 — Kategoriya tahlili
   FIX: ishlayotgan JS snippet ishlatiladi
   FIX: mahsulot nomlari /api/products orqali olinadi
   ================================================================ */

// FIX: ishlayotgan kategoriya snippet (avvalgi [data-product-id] ishlamaydi)
var JS_CODE = 'const ids=[];\ndocument.querySelectorAll(\'a[data-test-id="product-card--default"]\').forEach(c=>{\n  const m=(c.getAttribute(\'href\')||\'\').match(/-([0-9]+)[?$]/)||\n          (c.getAttribute(\'href\')||\'\').match(/-([0-9]+)$/);\n  if(m)ids.push(parseInt(m[1]));\n});\nconst u=[...new Set(ids)];\ncopy(JSON.stringify(u));\nconsole.log(\'\\u2705 \'+u.length+\' ta ID clipboard ga kochirildi\');';

const category = {
  step: 1,
  ids: [],
  results: [],
  loading: false,
  progress: 0,
  progressText: '',
  selected: new Set(),

  init() {
    document.getElementById('headerActions').innerHTML = '';
    this.render();
  },

  render() {
    var c = document.getElementById('appContent');
    c.innerHTML = this.stepIndicator() + this.stepContent();
    if (this.step === 3 && !this.loading && this.results.length) {
      this.bindCheckboxes();
    }
  },

  stepIndicator() {
    var s = this.step;
    return '<div class="step-row">' +
      '<div class="step-dot ' + (s >= 1 ? (s > 1 ? 'done' : 'act') : '') + '">' + (s > 1 ? '✓' : '1') + '</div>' +
      '<div class="step-line ' + (s > 1 ? 'done' : '') + '"></div>' +
      '<div class="step-dot ' + (s >= 2 ? (s > 2 ? 'done' : 'act') : '') + '">' + (s > 2 ? '✓' : '2') + '</div>' +
      '<div class="step-line ' + (s > 2 ? 'done' : '') + '"></div>' +
      '<div class="step-dot ' + (s >= 3 ? 'act' : '') + '">3</div>' +
    '</div>';
  },

  stepContent() {
    if (this.step === 1) return this.step1HTML();
    if (this.step === 2) return this.step2HTML();
    return this.step3HTML();
  },

  step1HTML() {
    var highlighted = JS_CODE
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/(\/\/[^\n]*)/g, '<span class="cmt">$1</span>')
      .replace(/\b(const|let|var|new|return)\b/g, '<span class="kw">$1</span>')
      .replace(/\b(document|Set|Array|copy|console)\b/g, '<span class="fn">$1</span>')
      .replace(/('[^']*')/g, '<span class="str">$1</span>');

    return '<div style="padding:0 14px 12px">' +
        '<div style="font-size:16px;font-weight:700;margin-bottom:5px">1-qadam: ID\'larni oling</div>' +
        '<div style="font-size:13px;line-height:1.55;margin-bottom:14px" class="txt-hint">Uzum.uz saytida kategoriya sahifasini oching, so\'ng quyidagi kodni brauzer konsolida ishga tushiring</div>' +
      '</div>' +
      '<div class="code-block">' +
        '<div class="code-block-hdr">' +
          '<span class="code-lang">JavaScript · Console</span>' +
          '<button class="code-copy-btn" onclick="category.copyCode()">📋 Nusxa olish</button>' +
        '</div>' +
        '<div class="code-body">' + highlighted + '</div>' +
      '</div>' +
      '<div style="padding:0 14px 16px">' +
        '<div class="hint-box">' +
          '<div class="hint-box-title">💡 Qanday ishlaydi:</div>' +
          '<div class="hint-box-text">Uzum.uz → Kategoriya → F12 → Console → kodni paste qiling → Enter → ID\'lar avtomatik nusxalanadi</div>' +
        '</div>' +
        '<button class="btn btn-accent btn-full" onclick="category.toStep2()">Davom etish →</button>' +
      '</div>';
  },

  step2HTML() {
    return '<div style="padding:0 14px 12px">' +
        '<div style="font-size:16px;font-weight:700;margin-bottom:5px">2-qadam: ID\'larni joylashtiring</div>' +
        '<div style="font-size:13px;line-height:1.55;margin-bottom:14px" class="txt-hint">Nusxalangan ID\'larni quyidaga paste qiling</div>' +
      '</div>' +
      '<div style="padding:0 14px 16px">' +
        '<textarea class="inp" id="idsArea" placeholder="[12345678,87654321,...] yoki har qatorga bitta">' + this.ids.join('\n') + '</textarea>' +
        '<div style="display:flex;gap:8px;margin-top:12px">' +
          '<button class="btn btn-ghost btn-sm" style="flex-shrink:0" onclick="category.toStep1()">← Orqaga</button>' +
          '<button class="btn btn-accent btn-full" onclick="category.startAnalysis()">🔍 Tahlil qilish</button>' +
        '</div>' +
      '</div>';
  },

  step3HTML() {
    if (this.loading) {
      return '<div style="padding:24px 14px">' +
        '<div style="font-size:15px;font-weight:600;margin-bottom:14px">Tahlil qilinmoqda…</div>' +
        '<div class="anim-bar"><div class="anim-fill" id="progFill" style="width:' + this.progress + '%"></div></div>' +
        '<div style="font-size:13px;margin-top:10px" class="txt-hint" id="progText">' + this.progressText + '</div>' +
      '</div>';
    }

    if (!this.results.length) {
      return '<div class="empty-state">' +
        '<div class="empty-icon">🤷</div>' +
        '<div class="empty-title">Natija topilmadi</div>' +
        '<div class="empty-desc">ID\'larni tekshirib qaytadan urinib ko\'ring</div>' +
        '<button class="btn btn-ghost" style="margin-top:14px" onclick="category.toStep2()">← Orqaga</button>' +
      '</div>';
    }

    var selCount = this.selected.size;
    var self = this;
    return '<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px 6px">' +
        '<div style="font-size:14px;font-weight:700">' + this.results.length + ' ta mahsulot</div>' +
        '<button class="btn btn-ghost btn-sm" onclick="category.reset()">↺ Yangi tahlil</button>' +
      '</div>' +
      (selCount ? '<div style="padding:0 14px 10px"><button class="btn btn-accent btn-full" id="trackSelBtn" onclick="category.trackSel()">+ ' + selCount + ' ta mahsulotni kuzatuvga qo\'shish</button></div>' : '') +
      '<div class="results-card" id="resultsCard">' +
        this.results.map(function(r, i) { return self.resultRowHTML(r, i); }).join('') +
      '</div>';
  },

  resultRowHTML(r, i) {
    var on = this.selected.has(String(r.id));
    return '<div class="res-row" data-id="' + r.id + '">' +
      '<div class="res-rank">' + (i+1) + '</div>' +
      '<div class="res-info">' +
        '<div class="res-title">' + (r.title || 'Mahsulot #' + r.id) + '</div>' +
        '<div class="res-id">ID: ' + r.id + '</div>' +
      '</div>' +
      '<div class="res-buyers">' +
        '<div class="res-buyers-num">' + fmt(r.weeklyBuyers) + '</div>' +
        '<div class="res-buyers-lbl">kishi/hafta</div>' +
      '</div>' +
      '<div class="res-chk ' + (on ? 'on' : '') + '" data-id="' + r.id + '">' + (on ? '✓' : '') + '</div>' +
    '</div>';
  },

  bindCheckboxes() {
    document.querySelectorAll('.res-chk').forEach(function(el) {
      el.addEventListener('click', function() { category.toggleResult(el.dataset.id); });
    });
  },

  copyCode() {
    // Actual JS code to copy (unescaped)
    var code = 'const ids=[];\ndocument.querySelectorAll(\'a[data-test-id="product-card--default"]\').forEach(c=>{\n  const m=(c.getAttribute(\'href\')||\'\').match(/-([0-9]+)[?$]/)||\n          (c.getAttribute(\'href\')||\'\').match(/-([0-9]+)$/);\n  if(m)ids.push(parseInt(m[1]));\n});\nconst u=[...new Set(ids)];\ncopy(JSON.stringify(u));\nconsole.log(\'✅ \'+u.length+\' ta ID clipboard ga kochirildi\');';
    navigator.clipboard.writeText(code)
      .then(function() { showToast('✓ Kod nusxalandi'); })
      .catch(function() { showToast('Nusxa olish muvaffaqiyatsiz'); });
  },

  toStep1() { this.step = 1; this.render(); },
  toStep2() { this.step = 2; this.render(); },

  parseIds(text) {
    return Array.from(new Set(
      text.split(/[\n,;\s\[\]]+/)
          .map(function(s) { return s.trim(); })
          .filter(function(s) { return /^\d{5,}$/.test(s); })
    ));
  },

  async startAnalysis() {
    var area = document.getElementById('idsArea');
    if (!area) return;
    this.ids = this.parseIds(area.value);
    if (!this.ids.length) { showToast('⚠️ Kamida 1 ta ID kiriting'); return; }

    this.step = 3;
    this.loading = true;
    this.progress = 0;
    this.progressText = '0 / ' + this.ids.length + ' tekshirilmoqda…';
    this.selected.clear();
    this.results = [];
    this.render();

    // Build results array
    var results = this.ids.map(function(id) {
      return { id: id, title: null, weeklyBuyers: 0 };
    });

    // Step 1: haftalik xaridorlar (40%)
    try {
      this.progressText = 'Haftalik xaridorlar olinmoqda…';
      var fill = document.getElementById('progFill');
      var txt  = document.getElementById('progText');
      if (fill) fill.style.width = '10%';
      if (txt)  txt.textContent = this.progressText;

      var weekly = await apiWeekly(this.ids);
      if (Array.isArray(weekly)) {
        weekly.forEach(function(w) {
          var r = results.find(function(r) { return String(r.id) === String(w.id); });
          if (r) r.weeklyBuyers = w.weeklyBuyers || 0;
        });
      }
      fill = document.getElementById('progFill');
      if (fill) fill.style.width = '50%';
    } catch (e) {
      console.warn('Weekly API failed:', e);
    }

    // Step 2: mahsulot nomlari enrichment (50% → 90%)
    try {
      this.progressText = 'Mahsulot ma\'lumotlari yuklanmoqda…';
      var fill2 = document.getElementById('progFill');
      var txt2  = document.getElementById('progText');
      if (txt2) txt2.textContent = this.progressText;

      // Batch: top 50 ta (haftalik bo'yicha saralab)
      var sortedForEnrich = results.slice().sort(function(a, b) { return b.weeklyBuyers - a.weeklyBuyers; });
      var topIds = sortedForEnrich.slice(0, 50).map(function(r) { return r.id; });

      var prodData = await apiProducts(topIds);
      if (prodData && prodData.products) {
        prodData.products.forEach(function(p) {
          var r = results.find(function(r) { return String(r.id) === String(p.id); });
          if (r) r.title = p.title || null;
        });
      }
      fill2 = document.getElementById('progFill');
      if (fill2) fill2.style.width = '90%';
    } catch (e) {
      console.warn('Products enrichment failed:', e);
    }

    // Sort by weekly buyers
    results.sort(function(a, b) { return b.weeklyBuyers - a.weeklyBuyers; });

    var fill3 = document.getElementById('progFill');
    if (fill3) fill3.style.width = '100%';
    await new Promise(function(r) { setTimeout(r, 300); });

    this.results = results;
    this.loading = false;
    this.render();
  },

  toggleResult(id) {
    id = String(id);
    if (this.selected.has(id)) { this.selected.delete(id); }
    else { this.selected.add(id); }

    document.querySelectorAll('.res-chk[data-id="' + id + '"]').forEach(function(el) {
      var on = category.selected.has(id);
      el.classList.toggle('on', on);
      el.textContent = on ? '✓' : '';
    });

    var sel = this.selected.size;
    var btn = document.getElementById('trackSelBtn');
    if (sel && !btn) {
      var wrap = document.createElement('div');
      wrap.style.cssText = 'padding:0 14px 10px';
      wrap.innerHTML = '<button class="btn btn-accent btn-full" id="trackSelBtn" onclick="category.trackSel()">+ ' + sel + ' ta mahsulotni kuzatuvga qo\'shish</button>';
      var card = document.getElementById('resultsCard');
      if (card) card.before(wrap);
    } else if (!sel && btn) {
      btn.closest('div').remove();
    } else if (btn) {
      btn.textContent = '+ ' + sel + ' ta mahsulotni kuzatuvga qo\'shish';
    }
  },

  async trackSel() {
    var ids = Array.from(this.selected);
    try {
      await apiTrack(ids);
      showToast('✓ ' + ids.length + ' ta kuzatuvga qo\'shildi');
    } catch (e) {
      showToast('❌ Qo\'shishda xato');
    }
    this.selected.clear();
    this.render();
  },

  reset() {
    this.step = 2;
    this.results = [];
    this.selected.clear();
    this.render();
  }
};
</script>

<script>
/* ================================================================
   APP.JS — navigatsiya, toast, modal
   ================================================================ */

// Telegram init
(function() {
  try {
    var twa = window.Telegram.WebApp;
    twa.ready();
    twa.expand();
    if (twa.colorScheme === 'dark') {
      document.documentElement.style.setProperty('--skel-shine', 'rgba(255,255,255,0.08)');
      document.documentElement.style.setProperty('--skel-base', 'rgba(255,255,255,0.06)');
    }
  } catch(e) {}
})();

// Toast
var toastTimer = null;
function showToast(msg, ms) {
  ms = ms || 2400;
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('vis');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('vis'); }, ms);
}
window.showToast = showToast;

// Modal
function openModal(title) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = '';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
}
window.openModal  = openModal;
window.closeModal = closeModal;

// Navigation
var TABS = {
  tracking: { label: 'Kuzatuv',           mod: function() { return tracking;  } },
  product:  { label: 'Mahsulot tahlili',   mod: function() { return product;   } },
  category: { label: 'Kategoriya tahlili', mod: function() { return category;  } },
  research: { label: 'Tadqiqot',           mod: function() { return research;  } },
};

var currentTab = 'tracking';

function switchTab(id) {
  if (id === currentTab) return;
  if (currentTab === 'tracking') tracking.cancelSelect();

  document.querySelectorAll('.nav-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.tab === id);
  });
  document.getElementById('headerTitle').textContent = TABS[id].label;
  currentTab = id;
  TABS[id].mod().init();
}
window.switchTab = switchTab;

// Start
tracking.init();
</script>
